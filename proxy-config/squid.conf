# Squid Proxy — Domain Allow-List for Agent Platform
# Only the domains listed here will be reachable from the agent container.

# Recommended minimum: listen on port 3128
http_port 3128

# Define allowed destination domains
acl allowed_domains dstdomain .api.openai.com
acl allowed_domains dstdomain .api.anthropic.com

# Allow CONNECT method for HTTPS tunnelling
acl SSL_ports port 443
acl CONNECT method CONNECT
http_access deny CONNECT !SSL_ports

# Apply allow-list
http_access allow allowed_domains
http_access deny all
